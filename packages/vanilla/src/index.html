<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeedbackIt Chat Widget</title>
    <style>
        #feedbackit-widget {
            --primary-color: #12355b;
            --text-color: #ffffff;
        }
    </style>
</head>
<body>

          FeedbackIt.init({
              projectId: 'your-project-id',
              primaryColor: '#0061d5',
              textColor: '#000',
              // ... other configuration options
          });
      });
  </script>
